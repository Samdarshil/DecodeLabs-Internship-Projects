name: Security Scan

on:
  push:
    branches: [main]
  schedule:
    # Every Monday at 08:00 UTC
    - cron: '0 8 * * 1'

jobs:
  python-security:
    name: Python Security (Bandit + pip-audit)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install security tools
        run: pip install bandit pip-audit

      - name: Bandit — static analysis
        working-directory: ./backend
        run: bandit -r app/ -ll -f json -o bandit-report.json || true

      - name: pip-audit — dependency scan
        working-directory: ./backend
        run: pip-audit -r requirements.txt --format=json --output=pip-audit-report.json || true

      - name: Upload reports
        uses: actions/upload-artifact@v3
        with:
          name: security-reports
          path: |
            backend/bandit-report.json
            backend/pip-audit-report.json

  npm-audit:
    name: NPM Audit
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        working-directory: ./frontend
        run: npm ci

      - name: npm audit
        working-directory: ./frontend
        run: npm audit --audit-level=high || true

  dependabot-config:
    name: Verify Dependabot config
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check dependabot.yml exists
        run: test -f .github/dependabot.yml && echo "✅ dependabot.yml present" || echo "⚠ Missing dependabot.yml"
