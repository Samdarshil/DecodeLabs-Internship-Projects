name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # ── Backend tests ────────────────────────────────────────────────────────────
  backend:
    name: Backend — Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        working-directory: ./backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Train model
        working-directory: ./backend
        run: python train.py

      - name: Run tests with coverage
        working-directory: ./backend
        run: |
          pytest tests/ -v --tb=short \
            --cov=app --cov-report=xml --cov-report=term-missing \
            --cov-fail-under=75

      - name: Upload coverage
        uses: codecov/codecov-action@v3
        with:
          files: ./backend/coverage.xml
          flags: backend

  # ── Frontend tests ───────────────────────────────────────────────────────────
  frontend:
    name: Frontend — Node ${{ matrix.node-version }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: ["18", "20"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: ./frontend
        run: npm ci

      - name: Type check
        working-directory: ./frontend
        run: npm run type-check

      - name: Build
        working-directory: ./frontend
        env:
          VITE_API_URL: http://localhost:8000
        run: npm run build

  # ── Docker build validation ──────────────────────────────────────────────────
  docker:
    name: Docker build check
    runs-on: ubuntu-latest
    needs: [backend, frontend]

    steps:
      - uses: actions/checkout@v4

      - name: Build backend image
        run: docker build ./backend -t oncai-backend:ci

      - name: Build frontend image
        run: docker build ./frontend -t oncai-frontend:ci
